<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toggle War</title>
  <link id="favicon" rel="icon" href="data:," />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div id="auth-bar" class="auth-bar">
    <form id="auth-form" class="auth-form">
      <input id="auth-username" type="text" placeholder="Username" autocomplete="username" maxlength="20" />
      <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password" />
      <div class="auth-form__actions">
        <button id="login-btn" type="submit">Log in</button>
        <button id="register-btn" type="button">Register</button>
      </div>
    </form>
    <div id="auth-account" class="auth-account" hidden>
      <span>Signed in as <strong id="account-name"></strong></span>
      <button id="logout-btn" type="button">Log out</button>
    </div>
    <p id="auth-error" class="auth-error" role="alert"></p>
  </div>

  <main class="stage">
    <div class="panel">
      <div class="indicator-row">
        <aside class="stats stats--red" aria-label="Red statistics">
          <h2 class="stats__heading">Red</h2>
          <dl>
            <div class="stat">
              <dt>Total</dt>
              <dd id="total-red">—</dd>
            </div>
            <div class="stat">
              <dt>Longest</dt>
              <dd id="longest-red">—</dd>
            </div>
          </dl>
        </aside>

        <div class="current-streak indicator-col indicator-col--red" aria-live="polite">
          <span class="current-streak__label">Current</span>
          <span id="current-streak" class="current-streak__value">—</span>
        </div>

        <div id="indicator" class="indicator indicator--red" role="img" aria-label="Current state: red"></div>

        <aside class="stats stats--blue" aria-label="Blue statistics">
          <h2 class="stats__heading">Blue</h2>
          <dl>
            <div class="stat">
              <dt>Total</dt>
              <dd id="total-blue">—</dd>
            </div>
            <div class="stat">
              <dt>Longest</dt>
              <dd id="longest-blue">—</dd>
            </div>
          </dl>
        </aside>
      </div>

      <div class="controls">
        <div class="total-time" aria-live="polite">
          <span class="current-streak__label">Total time</span>
          <span id="total-time" class="current-streak__value">—</span>
        </div>
        <button id="switch" type="button" disabled>Switch</button>
        <p id="status" class="status" aria-live="polite">Connecting…</p>
      </div>
    </div>
  </main>

  <aside id="player-stats" class="player-stats side-panel side-panel--left" hidden
    aria-label="Your statistics">
    <h2 class="side-panel__heading">Your stats</h2>
    <dl class="player-stats__grid">
      <div class="stat">
        <dt>Total switches</dt>
        <dd id="ps-total">—</dd>
      </div>
      <div class="stat">
        <dt>Switches to red</dt>
        <dd id="ps-red">—</dd>
      </div>
      <div class="stat">
        <dt>Switches to blue</dt>
        <dd id="ps-blue">—</dd>
      </div>
      <div class="stat">
        <dt>Member since</dt>
        <dd id="ps-since">—</dd>
      </div>
      <div class="stat">
        <dt>Last active</dt>
        <dd id="ps-last">—</dd>
      </div>
    </dl>
  </aside>

  <aside id="leaderboard" class="leaderboard side-panel side-panel--right" aria-label="Leaderboard">
    <h2 class="side-panel__heading">Leaderboard</h2>
    <div class="leaderboard__tabs" role="tablist">
      <button class="leaderboard__tab leaderboard__tab--total is-active" data-board="total"
        type="button">Total</button>
      <button class="leaderboard__tab leaderboard__tab--red" data-board="red" type="button">Red</button>
      <button class="leaderboard__tab leaderboard__tab--blue" data-board="blue" type="button">Blue</button>
    </div>
    <ol id="lb-list" class="leaderboard__list"></ol>
    <p id="lb-empty" class="leaderboard__empty">No players yet.</p>
    <p id="lb-you" class="leaderboard__you" hidden></p>
  </aside>

  <script src="/app.js"></script>
</body>

</html>
